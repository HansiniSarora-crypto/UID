<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-color: mistyrose;
            }
            
            .Square {
            width: 150px;
            height: 150px;
            background-color:darkmagenta;
            margin: 100px auto;
            animation: Square 2s linear infinite;
            }
        @keyframes Square {
           from {
            transform: rotate(0deg);
            }
           to {
            transform: rotate(360deg);
            }
         }
        </style>
    </head>
    <body>
        <h1 style="font-family: 'Times New Roman', Times, serif;font-style: oblique;color: mediumvioletred;text-align: center;text-decoration: underline;">A Square that Continuously rotates using CSS Animation</h1>
        <div class="Square"></div>
    </body>
</html>
