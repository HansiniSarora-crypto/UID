<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-color: lavenderblush;
            }
            .Ball{
                width:150px;
                height:150px;
                background-color: lightpink;
                border-radius: 70%;
                position:relative;
                margin:100px auto;
                animation-name: Bouncing;
                animation-duration: 3s;
                animation-delay: 1.0257s;
                animation-timing-function: ease-in;
                animation-iteration-count: infinite;
                animation-direction: alternate;
            }
            @keyframes Bouncing {
                from{
                    top:0px;
                }
                to{
                    top:200px;
                }
            }
        </style>
    </head>
    <body>
        <h2 style="font-family: 'Times New Roman', Times, serif;font-style: oblique;color:darkmagenta;text-align: center;text-decoration: underline;font-size: x-large;">
            A Ball that moves up and down continuously using CSS Animations</h2>
        <div class="Ball"></div>
    </body>
</html>
