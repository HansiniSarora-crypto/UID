<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                width:100px;
                height:100px;
                background-color: mediumvioletred;
                transition-property: width ,height;
                transition-duration: 5.527s;
                transition-delay:3.108s;
            }
            div:hover{
                width:300px;
                height:200px;
            }
        </style>
    </head>
    <body>
        <h2>The Transition Property</h2>
        <p>Hover over the div element below to see the transition effect;</p>
        <div></div>
    </body>
</html>
